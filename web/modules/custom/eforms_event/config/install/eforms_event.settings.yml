emails:
  szemelyes:
    subject: 'Szakmai tájékoztató nap jelentkezés megerősítve'
    body: |
      Tisztelt @nev!

      Ezúton igazoljuk vissza „A nemzeti eljárások megújulása és az önálló részkezelés új lehetőségei” megnevezésű szakmai tájékoztató napra való jelentkezését az alábbiak szerint.

      Tájékoztató nap dátuma: @datum
      Részvétel módja: személyes jelenlét

      Kezdési időpont: 10:00 óra. Kérjük, hogy a pontos kezdés érdekében legalább 30 perccel korábban szíveskedjenek megérkezni a helyszínre; a regisztráció 09:30 és 10:00 óra között zajlik.

      A szakmai tájékoztató nap helyszíne: 1077 Budapest, Kéthly Anna tér 1. (Myhive Greenpoint 7 irodaház), II. emelet, 261-es tárgyaló. Az irodaházat kérjük a Klauzál utcai bejárat felől megközelíteni; a tárgyaló a Klauzál utca felőli oldalon található liftekkel érhető el.

      A helyszínen parkolás biztosítása nem megoldható, ennek okán kérjük, hogy a parkolási lehetőségekről a szakmai tájékoztató napot megelőzően szíveskedjen tájékozódni.

      A szakmai tájékoztató nap menetrendje itt érhető el: @menetrend

      Üdvözlettel:
      Új Világ Nonprofit Szolgáltató Kft., Oktatásszervezés
  teams:
    subject: 'Microsoft Teams meghívó és csatlakozási segédlet — szakmai tájékoztató nap'
    body: |
      Tisztelt @nev!

      Ezzel az üzenettel küldjük „A nemzeti eljárások megújulása és az önálló részkezelés új lehetőségei” szakmai tájékoztató nap (@datum) Microsoft Teams csatlakozási linkjét és a csatlakozási segédletet.

      Az értekezlethez az alábbi linkre kattintva tud csatlakozni:
      @link

      MICROSOFT TEAMS CSATLAKOZÁSI SEGÉDLET

      Támogatott böngészőkben (pl. Google Chrome, Microsoft Edge) az alábbi lehetőségek közül választhat:
      – Amennyiben böngészőből szeretne részt venni, kattintson a „Folytatás ebben a böngészőben” lehetőségre.
      – Amennyiben a Teams alkalmazásban szeretne részt venni, és az telepítve van számítógépén, kattintson az „A Teams app megnyitása” lehetőségre.
      – Amennyiben a Teams alkalmazásban szeretne részt venni, de az nincs telepítve számítógépén, kattintson az „A Windowshoz készült app letöltése” lehetőségre.

      Mozilla Firefoxban és egyéb, nem támogatott böngészőben:
      – Böngészős részvételhez kattintson az „A Teams használata a Microsoft Edge böngészőben” lehetőségre; a Teams alkalmazás megnyitása vagy letöltése itt is elérhető.

      Böngészőben való folytatás esetén a Teams engedélyt fog kérni a webkamera és a mikrofon használatához. A szakmai tájékoztató napon nincs lehetőség ezek használatára, így kattinthat az „Engedélyezés” vagy a „Letiltás” lehetőségre is. Amennyiben a „Letiltás” opciót választotta, a megjelenő figyelmeztetésnél kattintson a „Folytatás hang és videokép nélkül” gombra.

      Belépés előtt kérjük, írja be a „Név megadása” (a Teams alkalmazásban: „Enter Name”) mezőbe a teljes nevét, valamint győződjön meg arról, hogy a mező alatti kamera- és mikrofonikonok át vannak húzva — állapotukat a mellettük lévő kapcsolókkal tudja módosítani. Ezután kattintson a „Csatlakozás” („Join now”) gombra.

      Kérjük, várjon türelemmel, míg kollégáink beengedik Önt a szakmai tájékoztató napra! Felhívjuk figyelmét: amennyiben nem a jelentkezéskor megadott névvel próbál csatlakozni, kollégáink nem tudják Önt beengedni.

      Tájékoztatjuk, hogy az online szakmai tájékoztató napról képernyőfelvétel készül. A résztvevők kamerája és mikrofonja az esemény alatt nem aktív; a résztvevőlistában megjelenő név és a csetben írt üzenetek a felvételen szerepelhetnek. Részletek az adatkezelési tájékoztatóban: @adatkezeles

      Kérdés esetén: @kapcsolat

      Üdvözlettel:
      Új Világ Nonprofit Szolgáltató Kft., Oktatásszervezés
  emlekezteto_szemelyes:
    subject: 'Emlékeztető — szakmai tájékoztató nap holnap'
    body: |
      Tisztelt @nev!

      Emlékeztetjük, hogy „A nemzeti eljárások megújulása és az önálló részkezelés új lehetőségei” szakmai tájékoztató nap, amelyre személyes részvétellel regisztrált, holnap, @datum kerül megrendezésre.

      Helyszín: 1077 Budapest, Kéthly Anna tér 1. (Myhive Greenpoint 7 irodaház), II. emelet, 261-es tárgyaló. Az irodaházat kérjük a Klauzál utcai bejárat felől megközelíteni; a tárgyaló a Klauzál utca felőli oldalon található liftekkel érhető el.

      A program 10:00 órakor kezdődik; kérjük, hogy a helyszíni regisztrációhoz 09:30 és 10:00 óra között érkezzen meg. A helyszínen parkolás biztosítása nem megoldható, ezért kérjük, előzetesen tájékozódjon a parkolási lehetőségekről.

      A szakmai tájékoztató nap menetrendje itt érhető el: @menetrend

      Amennyiben mégsem tud részt venni, kérjük, jelezze a @kapcsolat címen.

      Üdvözlettel:
      Új Világ Nonprofit Szolgáltató Kft., Oktatásszervezés
  emlekezteto_online:
    subject: 'Emlékeztető — szakmai tájékoztató nap holnap (online)'
    body: |
      Tisztelt @nev!

      Emlékeztetjük, hogy „A nemzeti eljárások megújulása és az önálló részkezelés új lehetőségei” szakmai tájékoztató nap, amelyre online részvétellel regisztrált, holnap, @datum kerül megrendezésre. A program 10:00 órakor kezdődik.

      A Microsoft Teams csatlakozási linket és a csatlakozási segédletet külön üzenetben küldtük, illetve küldjük ki — legkésőbb a tájékoztató nap reggelén, 08:00 óráig. Amennyiben nem találja, ellenőrizze a levélszemét mappát is, vagy jelezze részünkre a @kapcsolat címen, illetve a +36 1 465-8899 telefonszámon.

      A szakmai tájékoztató nap menetrendje itt érhető el: @menetrend

      Üdvözlettel:
      Új Világ Nonprofit Szolgáltató Kft., Oktatásszervezés
