eforms_event.page:
  path: '/esemeny'
  defaults:
    _controller: '\Drupal\eforms_event\Controller\EventController::eventPage'
    _title: 'eForms felkészítő szakmai tájékoztató nap · 2026'
  requirements:
    _access: 'TRUE'

eforms_event.register:
  path: '/regisztracio'
  defaults:
    _controller: '\Drupal\eforms_event\Controller\EventController::registerPage'
    _title: 'Regisztráció'
  requirements:
    _access: 'TRUE'

eforms_event.done:
  path: '/regisztracio/kesz'
  defaults:
    _controller: '\Drupal\eforms_event\Controller\EventController::donePage'
    _title: 'Sikeres regisztráció'
  requirements:
    _access: 'TRUE'

eforms_event.privacy:
  path: '/adatkezelesi-tajekoztato'
  defaults:
    _controller: '\Drupal\eforms_event\Controller\EventController::privacyPage'
    _title: 'Adatkezelési tájékoztató'
  requirements:
    _access: 'TRUE'

eforms_event.imprint:
  path: '/impresszum'
  defaults:
    _controller: '\Drupal\eforms_event\Controller\EventController::imprintPage'
    _title: 'Impresszum'
  requirements:
    _access: 'TRUE'

eforms_event.export:
  path: '/admin/content/eforms-registrations/export'
  defaults:
    _controller: '\Drupal\eforms_event\Controller\RegistrationExportController::csv'
    _title: 'Regisztrációk exportálása'
  requirements:
    _permission: 'administer eforms registrations'
